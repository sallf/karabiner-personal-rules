<text x="28" y="48" fill="#f8fafc" font-size="28" font-weight="700">Karabiner personal rules</text>
<text x="28" y="76" fill="#94a3b8" font-size="14">caps lock is the heart of this layout. tap = esc, hold = HYPER (⌃⌥⌘⇧).</text>
<text x="28" y="96" fill="#94a3b8" font-size="14">letters in blue are remapped under HYPER. red/green badges connect simultaneous-press chords.</text>
